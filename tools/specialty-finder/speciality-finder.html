<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Specialties Finder</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />

    <link rel="stylesheet" href="../../shared/theme-tokens.css" />
    <link rel="stylesheet" href="speciality-finder.css" />
  </head>

  <body>
    <h1 class="mainHeading">Specialties Finder</h1>
    <p class="subHeading">
      Upload, Compare & Discover Common Medical Specialties
    </p>

    <!-- Upload drop zone — visible until a CSV loads; returns on Reset -->
    <div class="drop-zone" id="zoneCsv">
      <div class="dz-click-area" id="clickCsv">
        <input type="file" id="csvFile" accept=".csv" autocomplete="off" />
        <span class="badge badge-a">CSV file only</span>
        <i class="ti ti-file-type-csv"></i>
        <div class="dz-sub">Click or drop a CSV file</div>
        <div class="dz-name" id="nameCsv"></div>
      </div>
      <div class="err" id="errCsv"></div>
    </div>

    <!-- File bar: loaded-file pill (left) + Reset (right), one balanced row -->
    <div class="resetSpace">
      <div class="file-pill" id="filePill" style="display: none">
        <span class="badge badge-a">CSV</span>
        <span class="file-pill-name" id="filePillName"></span>
      </div>
      <button type="button" id="resetApp">Reset & Upload New File</button>
    </div>

    <div class="container">
      <section class="boxOne">
        <section class="inputSpecialties">
          <label>Enter Specialties:</label>
          <textarea
            id="specialty"
            rows="5"
            cols="50"
            autocomplete="off"
            placeholder="Enter one specialty per line...

Cardiology
Pediatrics
E.N.T."
          ></textarea>
          <button type="button" id="submitButton">Submit</button>
        </section>
        <section class="result">
          <button type="button" id="findCommon">Find Common Ones</button>
          <div class="outputContainer">
            <p class="infoPara"></p>
            <div class="heading">
              <h3><u>Common</u> <u>Specialties</u></h3>
            </div>
            <div class="specBox">
              <div class="commonSpecialties" id="commonSpecialties"></div>
              <button
                class="icon-btn copy-corner"
                data-target="commonSpecialties"
                title="Copy"
              >
                <svg class="glyph" viewBox="0 0 24 24">
                  <path
                    fill="currentColor"
                    d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2z"
                  />
                </svg>
                <svg class="tick" viewBox="0 0 24 24">
                  <path
                    fill="currentColor"
                    d="M9 16.2l-3.5-3.5-1.4 1.4L9 19 20 8l-1.4-1.4z"
                  />
                </svg>
              </button>
            </div>

            <div class="heading">
              <h3><u>Uncommon</u> <u>Specialties</u></h3>
            </div>
            <div class="specBox">
              <div class="unCommonSpecialties" id="unCommonSpecialties"></div>
              <button
                class="icon-btn copy-corner"
                data-target="unCommonSpecialties"
                title="Copy"
              >
                <svg class="glyph" viewBox="0 0 24 24">
                  <path
                    fill="currentColor"
                    d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2z"
                  />
                </svg>
                <svg class="tick" viewBox="0 0 24 24">
                  <path
                    fill="currentColor"
                    d="M9 16.2l-3.5-3.5-1.4 1.4L9 19 20 8l-1.4-1.4z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </section>
      </section>

      <section class="boxTwo">
        <div class="tableContainer">
          <table id="tableData"></table>
        </div>
      </section>
    </div>

    <button id="backToTop">
      <img
        width="70"
        height="70"
        src="https://img.icons8.com/bubbles/100/long-arrow-up.png"
        alt="long-arrow-up"
      />
    </button>

    <script src="speciality-finder.js"></script>
  </body>
</html>
